<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Administrativa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .btn_sair {
    position: fixed;
    top: 30px;
    right: 100px;
    color:#007bff;
    font-weight: bold;
    }

</style>

<body>

    <a href="index.html" class="btn_sair">Sair</a>

    <div class="container mt-5">
        <h2 class="text-center">Gestão Administrativa</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Data de Nascimento</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <!-- Modal para edição -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Editar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="cpf" class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf" required>
                        </div>
                        <div class="mb-3">
                            <label for="nascimento" class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control" id="nascimento" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        const loadUsers = async () => {
            try {
                const response = await axios.get('/api/user');
                const users = response.data;
                const table = document.getElementById('userTable');
                table.innerHTML = users.map(user => {
                const nascimentoFormatted = new Date(user.nascimento).toLocaleDateString('pt-BR');
                return`
                    <tr>
                        <td>${user.nome}</td>
                        <td>${user.cpf}</td>
                        <td>${nascimentoFormatted}</td>
                        <td>${user.email}</td>
                        <td>
                            <button class="btn btn-warning" onclick="openEditModal('${user._id}')">Editar</button>
                            <button class="btn btn-danger" onclick="handleDelete('${user._id}')">Excluir</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (err) {
                alert('Erro ao carregar usuários.');
            }
        };
        loadUsers();

        const handleDelete = async (id) => {
            try {
                const confirmDelete = window.confirm("Tem certeza que deseja excluir este usuário?");
                if (!confirmDelete) return;

                await axios.delete(`/api/user/${id}`);
                alert("Usuário excluído com sucesso!");
                loadUsers(); // Recarrega a lista de usuários após exclusão
            } catch (err) {
                alert("Erro ao excluir usuário.");
            }
        };

        const openEditModal = async (id) => {
            try {
                const response = await axios.get(`/api/user/${id}`);
                const user = response.data;

                // Preenche os campos do modal com os dados do usuário
                document.getElementById('nome').value = user.nome;
                document.getElementById('cpf').value = user.cpf;
                document.getElementById('nascimento').value = user.nascimento;
                document.getElementById('email').value = user.email;

                // Configura o evento de submissão do formulário
                const editForm = document.getElementById('editForm');
                editForm.onsubmit = async (e) => {
                    e.preventDefault();
                    const updatedUser = {
                        nome: document.getElementById('nome').value,
                        cpf: document.getElementById('cpf').value,
                        nascimento: document.getElementById('nascimento').value,
                        email: document.getElementById('email').value,
                    };

                    try {
                        await axios.put(`/api/user/${id}`, updatedUser);
                        alert('Usuário atualizado com sucesso!');
                        const editModal = bootstrap.Modal.getInstance(document.getElementById('editModal'));
                        editModal.hide();
                        loadUsers();
                    } catch (err) {
                        alert('Erro ao atualizar usuário.');
                    }
                };

                // Exibe o modal
                const editModal = new bootstrap.Modal(document.getElementById('editModal'));
                editModal.show();
            } catch (err) {
                alert('Erro ao carregar dados para edição.');
            }
        };
    </script>
</body>

</html>
